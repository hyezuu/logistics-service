management:
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"
  tracing:
    sampling:
      probability: 1.0

server:
  port: 19041

springdoc:
  swagger-ui:
    enabled: true
    path: /docs
    url: /springdoc/openapi3-slack-service.json
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    enabled: true
    path: /api-docs-slack-service
slack:
  key: ${SLACK_KEY}

ai:
  api:
    key: ${AI_API_KEY}
    url: ${AI_API_URL}